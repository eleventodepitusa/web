<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Evento de Pitusa | Gestión de Eventos Infantiles Gran Canaria</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <style>
        /* --- VARIABLES DE DISEÑO --- */
        :root {
            --color-mirlo: #2d3436; /* Negro moderno */
            --color-pico: #f1c40f;   /* Amarillo detalle */
            --color-globo: #ff9a9e;  /* Rosa pastel */
            --color-hilo: #a1c4fd;   /* Azul pastel */
            --color-fondo: #fffdf9;  /* Crema muy suave */
            --color-card: #ffffff;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--color-fondo);
            color: var(--color-mirlo);
            margin: 0;
            line-height: 1.6;
        }

        /* --- HEADER CON NAVEGACIÓN --- */
        header {
            background-color: var(--color-card);
            padding: 50px 20px;
            text-align: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            position: relative;
        }

        .btn-galeria-top {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: var(--color-mirlo);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-galeria-top:hover {
            background-color: #444;
            transform: translateY(-2px);
        }

        .logo-container {
            max-width: 280px;
            margin: 0 auto;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        header p {
            margin-top: 20px;
            font-size: 1.1rem;
            color: #666;
            font-weight: 300;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        /* --- CONTENEDOR --- */
        .container {
            max-width: 850px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .card {
            background-color: var(--color-card);
            padding: 45px;
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04);
            margin-bottom: 40px;
        }

        h2 {
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
        }

        h2::before {
            content: '';
            width: 8px;
            height: 35px;
            background-color: var(--color-pico);
            margin-right: 15px;
            border-radius: 4px;
        }

        h3 {
            font-size: 1.1rem;
            margin-top: 35px;
            color: #555;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 10px;
        }

        /* --- FORMULARIO --- */
        .grid-campos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .campo { display: flex; flex-direction: column; }
        
        label {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #888;
        }

        input, select, textarea {
            padding: 15px;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--color-globo); }

        /* --- SERVICIOS GRID --- */
        .servicios-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            padding: 20px;
            background: #fcfcfc;
            border-radius: 15px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .checkbox-item input {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            accent-color: var(--color-globo);
        }

        /* --- PACK ESPECIAL --- */
        .pack-especial {
            background-color: #fff9e6;
            border: 2px dashed #fceabb;
            padding: 25px;
            border-radius: 20px;
            margin-top: 25px;
        }

        .pack-especial h3 { border: none; color: #d35400; margin-top: 0; }

        /* --- BOTONES --- */
        .btn-enviar {
            background-color: var(--color-mirlo);
            color: white;
            border: none;
            padding: 22px;
            width: 100%;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-enviar:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            background-color: #444;
        }

        .footer-nota {
            text-align: center;
            font-size: 0.8rem;
            color: #999;
            margin-top: 30px;
        }

        @media (max-width: 600px) {
            .grid-campos { grid-template-columns: 1fr; }
            header { padding: 40px 10px; }
            .btn-galeria-top { top: 10px; right: 10px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <div class="logo-container">

    </div>
    <p>Creamos momentos mágicos con gestión integral y personalizada.</p>
