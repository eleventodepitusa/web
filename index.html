<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Evento de Pitusa | Eventos en Gran Canaria</title>
    <link rel="icon" type="image/png" href="./img/logo.png">
    <style>
        :root {
            --color-rojo: #e30613;
            --color-mirlo: #2d3436;
            --color-fondo: #fffdf9;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--color-fondo); margin: 0; text-align: center; }
        
        .hero { padding: 50px 20px; }
        .logo-main { max-width: 200px; margin-bottom: 20px; }
        
        /* Contenedor de botones */
        .grid-botones {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
        }

        .btn-principal {
            background-color: white;
            color: var(--color-mirlo);
            text-decoration: none;
            padding: 20px;
            border-radius: 15px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
            border: 2px solid transparent;
        }
        
        .btn-principal:hover { border-color: var(--color-rojo); transform: translateY(-5px); }
        
        /* Botón destacado para Experiencias */
        .btn-destacado { background-color: var(--color-rojo); color: white; }
    </style>
</head>
<body>

<section class="hero">
    <img src="./img/logo.png" alt="Logo" class="logo-main">
    <h1>¡Hacemos realidad tu evento!</h1>
    <p>Decoración, castillos hinchables, animación y mucho más.</p>
    
    <div class="grid-botones">
        <a href="experiencias.html" class="btn-principal btn-destacado">✈️ EXPERIENCIA BARCELONA</a>
        
        <a href="galeria.html#hinchables" class="btn-principal">🏰 CASTILLOS</a>
        
        <a href="galeria.html#animacion" class="btn-principal">🎪 ANIMACIÓN</a>
        <a href="galeria.html#personalizacion" class="btn-principal">🎨 PERSONALIZACIÓN</a>
        
        <a href="galeria.html#decoracion" class="btn-principal">🎈 DECORACIÓN</a>
        <a href="galeria.html#bellypainting" class="btn-principal">🤰 BELLYPAINTING</a>
        <a href="galeria.html#alquiler" class="btn-principal">🏠 ALQUILER LOCAL</a>
    </div>
</section>

</body>
</html>
