<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presupuesto | El Evento de Pitusa</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --rosa: #f2a6b1; --negro: #333; --fondo: #f8f9fa; --verde: #25d366; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background: #fff; color: var(--negro); line-height: 1.6; }
        header { text-align: center; padding: 30px; background: var(--fondo); }
        .logo { max-width: 220px; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        .card { background: var(--fondo); padding: 25px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #eee; }
        h2 { color: var(--negro); border-bottom: 2px solid var(--rosa); padding-bottom: 10px; font-size: 1.4rem; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .servicio-item { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        select, input { padding: 10px; border-radius: 8px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; }
        .resumen { background: var(--negro); color: white; padding: 20px; border-radius: 15px; margin-top: 30px; }
        .total-row { display: flex; justify-content: space-between; font-size: 1.2rem; margin-top: 10px; }
        .total-final { font-size: 1.8rem; color: var(--rosa); font-weight: bold; border-top: 1px solid #555; padding-top: 10px; }
        
        /* Botones */
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .btn { padding: 15px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; font-size: 1rem; transition: 0.3s; display: inline-block; }
        .btn-wa { background: var(--verde); color: white; }
        .btn-pdf { background: #555; color: white; }
        .btn-galeria { 
            background: var(--negro); 
            color: white; 
            margin: 20px auto; 
            display: block; 
            max-width: 300px;
            border: 2px solid var(--rosa);
        }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }

        @media (max-width: 600px) { .form-grid, .btn-group { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <img src="tu-logo-pitusa.webp" alt="El Evento de Pitusa" class="logo">
    <h1>Presupuesto de Servicios</h1>
    <a href="galeria.html" class="btn btn-galeria">📸 Ver Galería de Fotos</a>
</header>

<div class="container" id="hoja-presupuesto">
    <div class="card">
        <h2>1. Datos del Evento</h2>
        <div class="form-grid">
            <select id="tipo-evento"><option value="">Tipo de evento...</option><option value="Comunión">Comunión</option><option value="Cumpleaños">Cumpleaños</option><option value="Boda">Boda</option><option value="Privado">Privado</option></select>
            <input type="date" id="fecha-evento">
            <input type="text" id="ubicacion" placeholder="Lugar/Municipio">
            <input type="number" id="adultos" placeholder="Nº Adultos">
        </div>
    </div>

    <div class="card">
        <h2>2. Hinchables</h2>
        <div id="lista-hinchables"></div>
    </div>

    <div class="card">
        <h2>3. Otros Servicios</h2>
        <select class="select-prod" onchange="calcular()">
            <option value="0">Animación...</option>
            <option value="150">Pack Sonrisa (2h - 2 mon.) - 150€</option>
            <option value="125">Pintacaras+Globo (1.5h - 2 mon.) - 125€</option>
            <option value="95">Pintacaras+Globo (1.5h - 1 mon.) - 95€</option>
            <option value="70">Pintacaras+Globo (1h - Indiv.) - 70€</option>
        </select>
        <br><br>
        <select class="select-prod" onchange="calcular()">
            <option value="0">Cañón de Espuma...</option>
            <option value="280">Cañón Público - 280€</option>
            <option value="230">Cañón Privado - 230€</option>
        </select>
        <br><br>
        <select class="select-prod" onchange="calcular()">
            <option value="0">Máquina Azúcar/Palomitas...</option>
            <option value="140">Individual (1.5h) - 140€</option>
        </select>
    </div>

    <div class="resumen">
        <div class="total-row"><span>Subtotal:</span><span><span id="sub-val">0</span>€</span></div>
        <div class="total-row" style="font-size: 0.9rem; color: #aaa;"><span>Gestión Integral (10%):</span><span><span id="ges-val">0</span>€</span></div>
        <div class="total-row total-final"><span>TOTAL ESTIMADO:</span><span><span id="tot-val">0</span>€</span></div>
        <p style="font-size: 0.8rem; margin-top: 15px;">* Sujeto a disponibilidad. El 10% incluye la gestión, seguros y logística.</p>
    </div>

    <div class="btn-group">
        <button onclick="enviarWA()" class="btn btn-wa">Enviar a Pitusa (WhatsApp)</button>
        <button onclick="generarPDF()" class="btn btn-pdf">Descargar mi Presupuesto</button>
    </div>
</div>

<script>
    const hinchables = [
        {n: "Campanilla/Stitch (3x4)", p2: 150, p3: 180},
        {n: "Sonrisa/Aventura/Rampa (5x4)", p2: 160, p3: 190},
        {n: "Rampa II / Ojo de Buey (6x4)", p2: 170, p3: 200},
        {n: "Tobogán (8x4)", p2: 190, p3: 220},
        {n: "Pista Americana (12x4)", p2: 260, p3: 300}
    ];

    function cargarHinchables() {
        let html = "";
        hinchables.forEach(h => {
            html += `<div class="servicio-item">
                <span><strong>${h.n}</strong></span>
                <select class="h-select" onchange="calcular()">
                    <option value="0" data-n="Sin ${h.n}">No añadir</option>
                    <option value="${h.p2}" data-n="${h.n} (2h)">2 Horas (${h.p2}€)</option>
                    <option value="${h.p3}" data-n="${h.n} (3h)">3 Horas (${h.p3}€)</option>
                </select>
            </div>`;
        });
        document.getElementById('lista-hinchables').innerHTML = html;
    }

    function calcular() {
        let sub = 0;
        document.querySelectorAll('.h-select, .select-prod').forEach(s => sub += parseFloat(s.value));
        let ges = sub * 0.10;
        document.getElementById('sub-val').innerText = sub.toFixed(2);
        document.getElementById('ges-val').innerText = ges.toFixed(2);
        document.getElementById('tot-val').innerText = (sub + ges).toFixed(2);
    }

    function enviarWA() {
        const tipo = document.getElementById('tipo-evento').value;
        const fecha = document.getElementById('fecha-evento').value;
        const total = document.getElementById('tot-val').innerText;
        if(!tipo || !fecha) return alert("Rellena fecha y tipo de evento");

        let msg = `¡Hola Pitusa! 👋 Presupuesto para ${tipo} (${fecha}):%0A`;
        document.querySelectorAll('.h-select, .select-prod').forEach(s => {
            if(s.value > 0) msg += `- ${s.options[s.selectedIndex].text}%0A`;
        });
        msg += `%0A*TOTAL con Gestión:* ${total}€`;
        window.open(`https://wa.me/34652678718?text=${msg}`);
    }

    function generarPDF() {
        const el = document.getElementById('hoja-presupuesto');
        html2pdf().from(el).set({ margin: 0.5, filename: 'Presupuesto_Pitusa.pdf' }).save();
    }

    window.onload = cargarHinchables;
</script>

</body>
</html>
