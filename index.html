<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presupuesto | El Evento de Pitusa</title>
    <link rel="icon" type="image/png" href="./img/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --color-rojo: #e30613;
            --color-mirlo: #2d3436;
            --color-pico: #f1c40f;
            --color-fondo: #fffdf9;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--color-fondo); margin: 0; padding: 20px; text-align: center; }
        .logo-main { max-width: 180px; margin-bottom: 20px; }
        
        .btn-galeria-top { display: inline-block; background-color: var(--color-pico); color: var(--color-mirlo); text-decoration: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .formulario-presupuesto { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); max-width: 500px; margin: 0 auto; text-align: left; }
        label { display: block; margin-top: 15px; font-weight: 600; color: var(--color-mirlo); font-size: 0.9rem; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #eee; border-radius: 8px; box-sizing: border-box; font-size: 15px; background: #fafafa; }
        .row-inputs { display: flex; gap: 10px; }
        .row-inputs div { width: 50%; }
        
        /* Botón elegante */
        .btn-enviar { background-color: var(--color-mirlo); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 16px; margin-top: 25px; cursor: pointer; transition: 0.3s; }
        .btn-enviar:hover { background-color: #000; }

        /* Nota informativa discreta */
        .nota-informativa { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 20px; font-size: 0.8rem; color: #888; text-align: center; border-left: 3px solid #ddd; }
        
        footer { margin-top: 40px; padding: 20px; color: #bbb; font-size: 0.8rem; }
    </style>
</head>
<body>

    <img src="./img/logo.png" alt="Logo" class="logo-main">
    
    <div>
        <a href="galeria.html" class="btn-galeria-top">📸 VER GALERÍA DE TRABAJOS</a>
    </div>

    <div class="formulario-presupuesto">
        <form action="https://formsubmit.co/eleventodepitusa@gmail.com" method="POST">
            <input type="hidden" name="_next" value="https://eleventodepitusa.github.io/gracias.html">
            <input type="hidden" name="_captcha" value="false">

            <label>Nombre y Apellidos</label>
            <input type="text" name="nombre" placeholder="Tu nombre" required>

            <label>Teléfono de contacto</label>
            <input type="tel" name="telefono" placeholder="600 000 000" required>

            <label>Servicio deseado</label>
            <select name="servicio" required>
                <option value="" disabled selected>Elige un servicio...</option>
                <option value="Alquiler de Local">Alquiler de Local (Ingenio)</option>
                <option value="Castillos Hinchables">Castillos Hinchables</option>
                <option value="Animacion / Muñecotes">Animación / Muñecotes</option>
                <option value="Decoracion / Mesa Dulce">Decoración / Mesa Dulce</option>
                <option value="Bellypainting">Bellypainting</option>
                <option value="Personalizacion">Personalización</option>
                <option value="Pack Completo">Pack Completo</option>
                <option value="Campus Barcelona 2026">Campus Barcelona 2026</option>
            </select>

            <label>Fecha del evento</label>
            <input type="date" name="fecha" required>

            <div class="row-inputs">
                <div><label>Nº de Niños</label><input type="number" name="ninos" placeholder="0"></div>
                <div><label>Nº de Adultos</label><input type="number" name="adultos" placeholder="0"></div>
            </div>

            <label>Ubicación del evento</label>
            <input type="text" name="ubicacion" placeholder="Ej: Ingenio, Las Palmas..." required>

            <label>Espacio</label>
            <select name="espacio">
                <option value="Local cerrado">Local cerrado</option>
                <option value="Aire libre">Aire libre</option>
                <option value="Terraza/Jardín">Terraza/Jardín</option>
            </select>

            <label>Comentarios adicionales</label>
            <textarea name="mensaje" rows="3" placeholder="¿Alguna idea o temática especial?"></textarea>

            <button type="submit" class="btn-enviar">ENVIAR PRESUPUESTO</button>
        </form>

        <div class="nota-informativa">
            Para formalizar la reserva y bloqueo de fecha, se realiza un depósito del 50%.
        </div>
    </div>

    <footer>
        &copy; 2026 El Evento de Pitusa<br>
        eleventodepitusa@gmail.com
    </footer>

</body>
</html>
