<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Evento de Pitusa | Eventos en Gran Canaria</title>
    <link rel="icon" type="image/png" href="./img/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --color-mirlo: #2d3436;
            --color-pico: #f1c40f;
            --color-globo: #ff9a9e;
            --color-belly: #a1c4fd;
            --color-fondo: #fffdf9;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--color-fondo);
            color: var(--color-mirlo);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .hero {
            padding: 40px 20px;
            max-width: 600px;
        }

        .logo-principal {
            max-width: 280px;
            margin-bottom: 20px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            color: var(--color-mirlo);
        }

        p {
            font-size: 1.1rem;
            color: #636e72;
            margin-bottom: 30px;
        }

        .menu-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 320px;
        }

        .btn {
            text-decoration: none;
            padding: 18px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .btn-catalogo {
            background-color: var(--color-mirlo);
            color: white;
        }

        .btn-whatsapp {
            background-color: #25d366;
            color: white;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .footer-info {
            margin-top: 50px;
            padding: 20px;
            font-size: 0.9rem;
            color: #95a5a6;
            border-top: 1px solid #eee;
            width: 80%;
        }

        .badge-reserva {
            display: inline-block;
            background: #fff3cd;
            color: #856404;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="hero">
        <img src="./img/logo.png" alt="El Evento de Pitusa" class="logo-principal">
        <h1>¡Hacemos magia!</h1>
        <p>Decoración, castillos hinchables, bellypainting y mucho más en Gran Canaria.</p>

        <div class="menu-links">
            <a href="galeria.html" class="btn btn-catalogo">
                <i class="fas fa-images"></i> VER CATÁLOGO COMPLETO
            </a>
            <a href="https://wa.me/34652678718?text=Hola!%20Quiero%20pedir%20presupuesto" class="btn btn-whatsapp">
                <i class="fab fa-whatsapp"></i> PEDIR PRESUPUESTO
            </a>
        </div>

        <div class="badge-reserva">
            ✨ Reserva tu fecha con un 50% de adelanto
        </div>
    </div>

    <div class="footer-info">
        &copy; 2026 El Evento de Pitusa | Ingenio, Gran Canaria
    </div>

</body>
</html>
